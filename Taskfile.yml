# Task runner (go-task v3.51.1) — POSIX-sh syntax only (mvdan/sh runs these
# natively on Windows; no bash/WSL required). Only `docker`, `node`, `task`
# may be called as executables (cross-OS PATH guarantee).
#
# Readiness contract (FOUND-02): `up` delegates ALL readiness to compose
# healthchecks via `--wait` — zero hand-rolled wait loops here.
#
# Verify spine (Q-004 contract): `verify` and `verify:fast` delegate to
# scripts/checks/run-gate.mjs, which prints one `GATE <name> <millis>ms
# <PASS|FAIL>` line per gate plus a TOTAL line. In Phase 1 both run the same
# static set; the D-19 fast/full seam is the two separate task definitions —
# Phase 2 adds container-class gates to `verify` only. Gate-set changes are
# T3 (this file is on the tiers.json T3 list).
version: '3'

tasks:
  up:
    desc: Boot the full local stack (waits for healthchecks)
    cmds:
      - docker compose -f infra/compose.yaml up -d --wait

  down:
    desc: Tear down the local stack
    cmds:
      - docker compose -f infra/compose.yaml down

  ps:
    desc: Show local stack service status
    cmds:
      - docker compose -f infra/compose.yaml ps

  logs:
    desc: Follow local stack logs (last 100 lines)
    cmds:
      - docker compose -f infra/compose.yaml logs -f --tail=100

  verify:
    desc: Run every Phase-1 gate with per-gate timing (Q-004 full set)
    cmds:
      - node scripts/checks/run-gate.mjs --mode full

  verify:fast:
    desc: Static-only gate set, <60s budget (D-19 — same as verify in Phase 1)
    cmds:
      - node scripts/checks/run-gate.mjs --mode fast
